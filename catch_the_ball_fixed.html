
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catch The Ball</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(180deg,#7a0000,#ff1e1e);
    font-family:Arial,sans-serif;
    color:white;
}

.container-game{
    padding:20px;
}

.title{
    font-size:40px;
    font-weight:bold;
}

.subtitle{
    opacity:0.9;
    margin-bottom:20px;
}

.label{
    font-size:24px;
    font-weight:bold;
}

.value{
    font-size:50px;
    font-weight:bold;
}

.line{
    height:3px;
    background:white;
    margin:15px 0;
    border-radius:20px;
}

.btn-custom{
    border-radius:30px;
    padding:10px 22px;
    font-weight:bold;
    margin-right:10px;
}

#gameArea{
    width:100%;
    max-width:700px;
    height:420px;

    background:linear-gradient(180deg,#ff5a5a,#7a0000);

    border-radius:25px;
    margin-top:25px;

    position:relative;
    overflow:hidden;

    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

#basket{
    width:120px;
    height:20px;

    background:white;

    border-radius:20px;

    position:absolute;
    bottom:15px;
    left:250px;
}

.ball{
    width:35px;
    height:35px;

    background:yellow;

    border-radius:50%;

    position:absolute;

    box-shadow:0 0 15px yellow;
}

</style>
</head>

<body>

<div class="container-game">

    <h1 class="title">🎮 Catch The Ball</h1>

    <p class="subtitle">
        Mini game interaktif Bootstrap + JavaScript
    </p>

    <div class="label">Score</div>
    <div class="value" id="score">0</div>

    <div class="line"></div>

    <div class="label">Time</div>
    <div class="value" id="time">30</div>

    <button class="btn btn-light btn-custom mt-2" id="startBtn">
        ▶ Start Game
    </button>

    <button class="btn btn-dark btn-custom mt-2" id="themeBtn">
        🎨 Change Theme
    </button>

    <button class="btn btn-warning btn-custom mt-2" id="resetBtn">
        🔄 Reset
    </button>

    <div id="gameArea">
        <div id="basket"></div>
    </div>

</div>

<script>

const gameArea = document.getElementById("gameArea");
const basket = document.getElementById("basket");

const scoreText = document.getElementById("score");
const timeText = document.getElementById("time");

let score = 0;
let time = 30;
let gameRunning = false;

let basketX = 250;

let spawnInterval;
let timerInterval;

// TOUCH + MOUSE CONTROL

gameArea.addEventListener("mousemove", function(e){

    const rect = gameArea.getBoundingClientRect();

    basketX = e.clientX - rect.left - 60;

    if(basketX < 0){
        basketX = 0;
    }

    if(basketX > gameArea.clientWidth - 120){
        basketX = gameArea.clientWidth - 120;
    }

    basket.style.left = basketX + "px";

});

gameArea.addEventListener("touchmove", function(e){

    const rect = gameArea.getBoundingClientRect();

    basketX = e.touches[0].clientX - rect.left - 60;

    if(basketX < 0){
        basketX = 0;
    }

    if(basketX > gameArea.clientWidth - 120){
        basketX = gameArea.clientWidth - 120;
    }

    basket.style.left = basketX + "px";

});

// CREATE BALL

function createBall(){

    if(!gameRunning) return;

    const ball = document.createElement("div");

    ball.classList.add("ball");

    let x = Math.random() * (gameArea.clientWidth - 35);

    ball.style.left = x + "px";
    ball.style.top = "0px";

    gameArea.appendChild(ball);

    let y = 0;

    const fall = setInterval(function(){

        y += 5;

        ball.style.top = y + "px";

        const ballRect = ball.getBoundingClientRect();
        const basketRect = basket.getBoundingClientRect();

        // CATCH
        if(
            ballRect.bottom >= basketRect.top &&
            ballRect.left < basketRect.right &&
            ballRect.right > basketRect.left
        ){

            score++;

            scoreText.innerHTML = score;

            ball.remove();

            clearInterval(fall);

        }

        // MISS
        if(y > gameArea.clientHeight){

            ball.remove();

            clearInterval(fall);

        }

    },20);

}

// START GAME

function startGame(){

    if(gameRunning) return;

    gameRunning = true;

    score = 0;
    time = 30;

    scoreText.innerHTML = score;
    timeText.innerHTML = time;

    spawnInterval = setInterval(createBall,700);

    timerInterval = setInterval(function(){

        time--;

        timeText.innerHTML = time;

        if(time <= 0){

            clearInterval(timerInterval);
            clearInterval(spawnInterval);

            gameRunning = false;

            alert("🎉 Game Over! Score kamu: " + score);

        }

    },1000);

}

// RESET GAME

function resetGame(){

    location.reload();

}

// CHANGE THEME

function changeTheme(){

    document.body.style.background =
    "linear-gradient(180deg,#200000,#ff0000)";

    gameArea.style.background =
    "linear-gradient(180deg,#ff8080,#8b0000)";

}

document.getElementById("startBtn")
.addEventListener("click", startGame);

document.getElementById("themeBtn")
.addEventListener("click", changeTheme);

document.getElementById("resetBtn")
.addEventListener("click", resetGame);

</script>

</body>
</html>
